services:
  grafana:
    extends:
      file: .config/docker-compose-base.yaml
      service: grafana
    environment:
      # The nested Web View panel (id: wilsonwaters-webview-panel) is bundled inside
      # the app but registers as its own plugin id, so it must also be allow-listed
      # for unsigned loading in the dev environment.
      GF_PLUGINS_ALLOW_LOADING_UNSIGNED_PLUGINS: wilsonwaters-webview-app,wilsonwaters-webview-panel
